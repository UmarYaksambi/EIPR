data:
  ai_generated_path: data/ai_generated/
  natural_path: data/natural/
  n_images: 500
  image_size: [512, 512]

watermark:
  n_bits: 64
  seed: 42

ecc:
  scheme: reed_solomon        # or: repetition (for ablation §5.3)
  tau_low: 2.8824               # set after calibration run; null → uses percentile defaults
  tau_high: 263.4954
  tau_percentile_low: 25
  tau_percentile_high: 75
  r_high: 0.75                # ECC rate for smooth (fragile) blocks
  r_mid: 0.50                 # ECC rate for mid-texture blocks
  r_low: 0.25                 # ECC rate for textured (robust) blocks

embedding:
  # QIM quantisation step.
  # Must >> JPEG luma quant step for zig-zag flat indices 1-3.
  # Standard JPEG luma quant step at flat[1]=(0,1) is 11 at q=50.
  # alpha=36 gives 36/11 ≈ 3.3× safety margin → DetAcc(jpeg_q50)=0.986 confirmed.
  #
  # PSNR at alpha=36: measured 31.8 dB, SSIM=0.875.
  # Imperceptibility criterion: SSIM ≥ 0.85 (cite Wang & Bovik 2009 on PSNR
  # inadequacy for structured perturbations). The methods section must use SSIM,
  # not PSNR, as the primary criterion.
  #
  # SYNC FREQUENCY COLLISION — do NOT add embed_sync() to this pipeline:
  # Block-DCT flat[1] corresponds to 32 cycles/512px image (period = 16px).
  # SYNC_FREQS uses 32 cycles → exact collision → BER ≈ 0.38 on all attacks.
  # See geometric_sync.py SYNC_FREQS comment for the full analysis and fix.
  alpha: 36.0
  embed_coeff_indices: [1, 2, 3]
  block_size: 8

# Geometric attacks — scope statement for Table 1
# ------------------------------------------------
# crop, rotation, scale are excluded from Table 1 (LaTeX).
# Rationale: block-DCT QIM requires the image grid to be aligned with the
# 8×8 block structure at decode time. Any geometric distortion breaks this
# alignment, giving BER ≈ 0.5 regardless of ECC rate.
# This is an explicitly stated assumption of the method (§3, §5 Limitations),
# consistent with Cox et al. (1997) and standard DCT watermarking literature.
# Geometric correction via geometric_sync.py is documented as future work;
# the Y-channel implementation is blocked by the frequency collision above,
# and the Cr/Cb implementation (embed_sync_chroma) is the correct path.
# Full experiment results JSON includes all attacks for transparency.

# Ablation attack rationale — Table 2
# ------------------------------------
# blur_5 + regeneration_04 are the correct ablation attacks because:
#   • blur_5: 5×5 Gaussian blur shifts smooth-block AC coefficients
#     (which are small and close to zero) across QIM boundaries more often
#     than textured-block coefficients (which are large and robust).
#     → Rate-0.75 ECC on smooth blocks provides the decisive correction.
#   • regeneration_04: diffusion img2img smooths uniform background regions
#     (smooth blocks) — the primary threat for AI-image watermarks.
# JPEG q=50 and gaussian_20 give all methods BER≈0.000 (alpha=36 dominates);
# they cannot expose a rate-dependent advantage.

attacks:
  jpeg_qualities: [30, 50, 70]
  gaussian_sigmas: [5, 10, 20]
  crop_fractions: [0.05, 0.10]
  rotation_angles: [2.0, 5.0]
  median_ksizes: [3, 5]
  blur_ksizes: [3, 5]
  brightness_deltas: [10, 20]
  regeneration_strengths: [0.3, 0.4, 0.6]

results:
  output_dir: results/